<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>
body {
    text-align: center;
    background: linear-gradient(to right, #ff758c, #7a5cff);
    color: white;
    font-family: Arial;
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    font-size: 55px; /* increased */
}

#text {
    font-size: 28px; /* increased */
    margin: 20px;
    white-space: pre-line;
    line-height: 1.6;
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* Hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-800px);}
}
</style>

</head>

<body>

<h1>Happy Birthday Nanna 😘🫂</h1>

<div id="text"></div>

<button onclick="surprise()">Click for Surprise 💌</button>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
let message = `After I fell in love with you, this is your first birthday with me 🫠
After you came into my life, I truly started smiling 🤗
The way you guide me in the toughest situations and the care you show me… I love it so much 😁
No matter how many fights we have, let’s stay together like this for life… okay? ❤️

Thank you for always being there for me 💕
Love you soooooo much Bngru 😘💗
Forever yours, Ammulu ❤️`;

let i = 0;
function typeEffect() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();

function surprise() {
    alert("I LOVE YOU SO MUCH ❤️🥺");
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
